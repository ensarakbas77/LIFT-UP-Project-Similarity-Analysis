services:

  similarity-backend:
    build:
      context: ./similarity_analysis_app/backend
    ports:
      - "8000:8000"
    env_file:
      - ./similarity_analysis_app/backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      # Kod değişikliklerinin rebuild gerektirmeden anında yansıması için:
      - ./similarity_analysis_app/backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  similarity-frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./similarity_analysis_app/frontend:/usr/share/nginx/html:ro

  admin-backend:
    build:
      context: ./admin_dashboard
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./admin_dashboard/backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - admin_jobs:/app/backend/jobs
      # Kod ve frontend değişikliklerinin rebuild gerektirmeden anında yansıması için:
      - ./admin_dashboard/backend/app:/app/backend/app
      - ./admin_dashboard/frontend:/app/frontend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Lutfen root .env dosyasini olusturun (bkz .env.example)}"
      POSTGRES_DB: liftup_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  huggingface_cache:
  admin_jobs:
